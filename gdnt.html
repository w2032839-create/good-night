<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Night Aparna 🌙</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:
    radial-gradient(circle at 20% 20%, rgba(138,43,226,.4), transparent 30%),
    radial-gradient(circle at 80% 30%, rgba(0,191,255,.3), transparent 30%),
    radial-gradient(circle at 50% 80%, rgba(255,20,147,.2), transparent 35%),
    linear-gradient(to bottom,#020111,#0b1030,#16002b);
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.container{
    z-index:10;
    padding:20px;
}

h1{
    color:white;
    font-size:3rem;
    text-shadow:
        0 0 10px #fff,
        0 0 20px #ff9ff3,
        0 0 40px #ff9ff3;
    animation: glow 3s ease-in-out infinite alternate;
}

p{
    color:#f8f8ff;
    margin-top:15px;
    font-size:1.2rem;
    opacity:.9;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #fff,0 0 20px #ff9ff3;
    }
    to{
        text-shadow:0 0 20px #fff,0 0 40px #ff9ff3,0 0 60px #ff9ff3;
    }
}

/* Stars */
.star{
    position:absolute;
    background:white;
    border-radius:50%;
    animation: twinkle infinite alternate;
}

@keyframes twinkle{
    from{opacity:.2;transform:scale(.5);}
    to{opacity:1;transform:scale(1.3);}
}

/* Moons */
.moon{
    position:absolute;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #fff, #d9d9d9);
    box-shadow:0 0 30px rgba(255,255,255,.8);
}

/* Moon Animation 1 */
.moon1{
    width:90px;
    height:90px;
    top:8%;
    left:8%;
    animation: floatMoon 6s ease-in-out infinite;
}

/* Moon Animation 2 */
.moon2{
    width:60px;
    height:60px;
    top:15%;
    right:10%;
    animation: rotateMoon 15s linear infinite;
}

/* Moon Animation 3 */
.moon3{
    width:40px;
    height:40px;
    bottom:20%;
    left:15%;
    animation: pulseMoon 4s infinite;
}

@keyframes floatMoon{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-20px);}
}

@keyframes rotateMoon{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

@keyframes pulseMoon{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.3);}
}

/* Hearts */
.heart{
    position:absolute;
    color:#ff4da6;
    font-size:20px;
    animation: floatHeart linear infinite;
}

@keyframes floatHeart{
    from{
        transform:translateY(100vh) scale(.5);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    to{
        transform:translateY(-120vh) scale(1.5);
        opacity:0;
    }
}

/* Galaxy */
.galaxy{
    position:absolute;
    width:300px;
    height:300px;
    border-radius:50%;
    background:
      radial-gradient(circle,
      rgba(255,255,255,.2),
      rgba(138,43,226,.15),
      transparent 70%);
    filter:blur(10px);
    animation: galaxySpin 25s linear infinite;
}

@keyframes galaxySpin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* Confetti */
.confetti{
    position:absolute;
    width:8px;
    height:14px;
    animation: confettiFall linear infinite;
}

@keyframes confettiFall{
    from{
        transform:translateY(-10vh) rotate(0deg);
    }
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}

@media(max-width:768px){
    h1{
        font-size:2.1rem;
    }

    p{
        font-size:1rem;
    }

    .moon1{
        width:70px;
        height:70px;
    }

    .moon2{
        width:50px;
        height:50px;
    }
}
</style>
</head>
<body>

<div class="galaxy" style="top:10%;left:20%;"></div>
<div class="galaxy" style="bottom:5%;right:15%;"></div>

<div class="moon moon1"></div>
<div class="moon moon2"></div>
<div class="moon moon3"></div>

<div class="container">
    <h1>🌙 Good Night Aparna ❤️</h1>
    <p>
        May your dreams sparkle brighter than the stars,<br>
        shine softer than the moonlight,<br>
        and travel across beautiful galaxies tonight ✨🌌
    </p>
</div>

<script>

/* Stars */
for(let i=0;i<150;i++){
    let star=document.createElement("div");
    star.className="star";

    let size=Math.random()*4+1;

    star.style.width=size+"px";
    star.style.height=size+"px";
    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";
    star.style.animationDuration=(Math.random()*3+1)+"s";

    document.body.appendChild(star);
}

/* Hearts */
for(let i=0;i<25;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤";

    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(Math.random()*10+8)+"s";
    heart.style.animationDelay=Math.random()*10+"s";

    document.body.appendChild(heart);
}

/* Confetti */
const colors=[
'#ff4d6d',
'#ffd93d',
'#6bcB77',
'#4d96ff',
'#c77dff',
'#ffffff'
];

for(let i=0;i<80;i++){
    let confetti=document.createElement("div");
    confetti.className="confetti";

    confetti.style.left=Math.random()*100+"vw";
    confetti.style.background=
        colors[Math.floor(Math.random()*colors.length)];

    confetti.style.animationDuration=
        (Math.random()*5+5)+"s";

    confetti.style.animationDelay=
        Math.random()*5+"s";

    document.body.appendChild(confetti);
}

</script>

</body>
</html>
